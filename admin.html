<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Panel de Control | Tu Cuerpo Lo Sabe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#32CD32",
                        "surface": "#0e0e0e",
                        "surface-container": "#1a1a1a",
                        "surface-container-high": "#20201f",
                    },
                    fontFamily: {
                        "body": ["Plus Jakarta Sans", "sans-serif"],
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0e0e0e; color: #ffffff; font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="bg-surface antialiased" x-data="adminPanel()">
    
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-64 bg-surface-container border-r border-white/5 flex flex-col hidden md:flex">
            <div class="h-20 flex items-center px-6 border-b border-white/5">
                <span class="text-xl font-bold text-[#32CD32] italic">TCLS Admin</span>
            </div>
            <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
                <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-lg bg-[#32CD32]/10 text-[#32CD32] font-semibold">
                    <span class="material-symbols-outlined">dashboard</span> General
                </a>
                <a href="/" target="_blank" class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-400 hover:text-white hover:bg-white/5 transition-colors">
                    <span class="material-symbols-outlined">open_in_new</span> Ver Sitio Web
                </a>
            </nav>
            <div class="p-4 border-t border-white/5">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-[#32CD32] to-[#A020F0]"></div>
                    <div class="text-sm">
                        <p class="font-bold">Administrador</p>
                        <p class="text-xs text-gray-500">Sesión iniciada</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 relative overflow-y-auto bg-surface pb-20">
            <div class="max-w-4xl mx-auto p-6 md:p-10 space-y-8">
                
                <header class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <div>
                        <h1 class="text-3xl font-bold mb-1">Textos de la Página</h1>
                        <p class="text-gray-400 text-sm">Actualiza el contenido de la portada directamente desde aquí.</p>
                    </div>
                    
                    <button @click="saveData()" class="px-6 py-2.5 bg-[#32CD32] text-black font-bold rounded-lg flex items-center gap-2 hover:bg-white transition-colors shadow-lg" :disabled="isSaving" :class="{ 'opacity-50 cursor-not-allowed': isSaving }">
                        <span class="material-symbols-outlined text-sm" x-show="!isSaving">save</span>
                        <svg x-show="isSaving" class="animate-spin -ml-1 mr-2 h-4 w-4 text-black" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                        <span x-text="isSaving ? 'Guardando...' : 'Guardar Cambios'"></span>
                    </button>
                </header>
                
                <template x-if="message.text">
                    <div :class="message.type === 'success' ? 'bg-[#32CD32]/20 border-[#32CD32] text-[#32CD32]' : 'bg-red-500/20 border-red-500 text-red-400'" class="p-4 rounded-lg border flex items-center gap-3">
                        <span class="material-symbols-outlined" x-text="message.type === 'success' ? 'check_circle' : 'error'"></span>
                        <span x-text="message.text" class="font-medium"></span>
                    </div>
                </template>

                <template x-if="isLoading">
                    <div class="py-20 text-center">
                        <span class="material-symbols-outlined text-4xl animate-spin text-[#32CD32]">refresh</span>
                        <p class="text-gray-400 mt-4">Cargando base de datos...</p>
                    </div>
                </template>

                <div x-show="!isLoading" class="space-y-6">
                    <!-- Sección Hero -->
                    <section class="bg-surface-container p-6 md:p-8 rounded-2xl border border-white/5 space-y-6">
                        <div class="flex items-center gap-2 text-[#32CD32] border-b border-white/10 pb-4">
                            <span class="material-symbols-outlined">title</span>
                            <h2 class="text-xl font-bold">Encabezado Principal (Hero)</h2>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-semibold text-gray-400 mb-2">Título Principal (Línea 1)</label>
                                <input x-model="data.heroTitle" type="text" class="w-full bg-surface-container-high border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-[#32CD32] transition-colors" placeholder="Ej. Despierta tu">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-gray-400 mb-2">Título Resaltado (Línea 2)</label>
                                <input x-model="data.heroSubtitle" type="text" class="w-full bg-surface-container-high border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-[#A020F0] transition-colors" placeholder="Ej. mejor versión.">
                            </div>
                            <div class="col-span-1 md:col-span-2">
                                <label class="block text-sm font-semibold text-gray-400 mb-2">Texto de soporte / Descripción</label>
                                <textarea x-model="data.heroTextBody" rows="3" class="w-full bg-surface-container-high border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-[#32CD32] transition-colors resize-none"></textarea>
                            </div>
                        </div>
                    </section>

                    <!-- Sección Nosotros / Filosofía -->
                    <section class="bg-surface-container p-6 md:p-8 rounded-2xl border border-white/5 space-y-6">
                        <div class="flex items-center gap-2 text-[#32CD32] border-b border-white/10 pb-4">
                            <span class="material-symbols-outlined">psychology</span>
                            <h2 class="text-xl font-bold">Filosofía ("Quiénes Somos")</h2>
                        </div>
                        <div class="space-y-5">
                            <div>
                                <label class="block text-sm font-semibold text-gray-400 mb-2">Párrafo Introductorio</label>
                                <textarea x-model="data.philosophyText1" rows="3" class="w-full bg-surface-container-high border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-[#32CD32] transition-colors resize-none"></textarea>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-gray-400 mb-2">Párrafo Secundario</label>
                                <textarea x-model="data.philosophyText2" rows="3" class="w-full bg-surface-container-high border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-[#32CD32] transition-colors resize-none"></textarea>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-[#A020F0] mb-2">Cita / Frase destacada (Regla de oro)</label>
                                <textarea x-model="data.philosophyText3" rows="3" class="w-full bg-[#A020F0]/10 border border-[#A020F0]/30 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-[#A020F0] transition-colors resize-none"></textarea>
                            </div>
                        </div>
                    </section>

                    <!-- Sección Estadísticas -->
                    <section class="bg-surface-container p-6 md:p-8 rounded-2xl border border-white/5 space-y-6">
                        <div class="flex items-center gap-2 text-[#32CD32] border-b border-white/10 pb-4">
                            <span class="material-symbols-outlined">trending_up</span>
                            <h2 class="text-xl font-bold">Métricas y Comunidad</h2>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-semibold text-gray-400 mb-2">Comunidad (Total Seguidores)</label>
                                <input x-model="data.statsCommunity" type="text" class="w-full bg-surface-container-high border border-white/10 rounded-lg px-4 py-3 text-xl font-bold text-[#32CD32] focus:outline-none focus:border-[#32CD32] transition-colors" placeholder="Ej. 50K+">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-gray-400 mb-2">Transformaciones de Vida</label>
                                <input x-model="data.statsTransformations" type="text" class="w-full bg-surface-container-high border border-white/10 rounded-lg px-4 py-3 text-xl font-bold text-[#A020F0] focus:outline-none focus:border-[#A020F0] transition-colors" placeholder="Ej. 1.2K+">
                            </div>
                        </div>
                    </section>
                </div>
                
            </div>
        </main>
    </div>

    <script>
        function adminPanel() {
            return {
                isLoading: true,
                isSaving: false,
                message: { text: '', type: '' },
                data: {
                    heroTitle: "",
                    heroSubtitle: "",
                    heroTextBody: "",
                    philosophyText1: "",
                    philosophyText2: "",
                    philosophyText3: "",
                    statsCommunity: "",
                    statsTransformations: ""
                },
                init() {
                    this.fetchData();
                },
                async fetchData() {
                    this.isLoading = true;
                    try {
                        const response = await fetch('/api/data');
                        if (response.ok) {
                            this.data = await response.json();
                        }
                    } catch (error) {
                        console.error("Error al cargar datos", error);
                        this.showMessage('No se pudo establecer conexión con la base de datos.', 'error');
                    } finally {
                        this.isLoading = false;
                    }
                },
                async saveData() {
                    this.isSaving = true;
                    this.message.text = '';
                    try {
                        const response = await fetch('/api/data', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(this.data)
                        });
                        const result = await response.json();
                        
                        if (response.ok && result.success) {
                            this.showMessage('Datos guardados con éxito. Los cambios ya están reflejados en la web.', 'success');
                        } else {
                            this.showMessage('Hubo un error al guardar los datos.', 'error');
                        }
                    } catch (error) {
                        console.error("Error guardando", error);
                        this.showMessage('Error de red. Intenta nuevamente.', 'error');
                    } finally {
                        this.isSaving = false;
                        setTimeout(() => this.message.text = '', 4000);
                    }
                },
                showMessage(text, type) {
                    this.message = { text, type };
                    // Auto slide to top to see message
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            }
        }
    </script>
</body>
</html>
